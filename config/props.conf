# =============================================================================
# props.conf — Splunk Indexer (macOS Host)
# Location: /Applications/Splunk/etc/system/local/props.conf
#
# Purpose: Force correct timestamp extraction from Windows XML event payloads.
#
# Problem this solves:
#   Windows VM and macOS host had a timezone mismatch. Without explicit %Z
#   declarations, Splunk misinterpreted local Windows timestamps, causing a
#   3-hour drift that placed attack events outside the default search window,
#   making them invisible in real-time dashboards.
# =============================================================================

[WinEventLog:Security]

# Force Splunk to look up to 30 characters ahead when parsing timestamps
MAX_TIMESTAMP_LOOKAHEAD = 30

# Anchor the timestamp search to the beginning of the event
TIME_PREFIX = ^

# Explicit format matching the Windows XML event timestamp structure:
#   %Y  = 4-digit year       (e.g., 2024)
#   %m  = 2-digit month      (e.g., 07)
#   %d  = 2-digit day        (e.g., 15)
#   %H  = 24-hour hour       (e.g., 00)
#   %M  = 2-digit minute     (e.g., 30)
#   %S  = 2-digit second     (e.g., 45)
#   %Q  = milliseconds
#   %Z  = timezone string    (critical — prevents misinterpretation)
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%Q%Z

# Result: Corrects 3-hour drift, events populate in real-time search windows
