# =============================================================================
# inputs.conf — Splunk Universal Forwarder (Windows 11 Target VM)
# Location: C:\Program Files\SplunkUniversalForwarder\etc\system\local\inputs.conf
#
# Purpose: Instructs the UF what data to collect and forward to the indexer.
#
# Requirements:
#   - SplunkForwarder Windows service must run as: Local System
#   - Local System provides NT AUTHORITY needed to read protected Security logs
#   - Without this, Security.evtx is inaccessible and no 4624/4625 events appear
# =============================================================================

# -----------------------------------------------------------------------------
# Windows Event Log — Security Channel
# This is the primary log source for authentication events.
# Captures: Event ID 4624 (Successful Logon), Event ID 4625 (Failed Logon)
# -----------------------------------------------------------------------------
[WinEventLog://Security]
disabled = false
index = main

# -----------------------------------------------------------------------------
# Windows Event Log — System Channel (optional — useful for service events)
# -----------------------------------------------------------------------------
[WinEventLog://System]
disabled = false
index = main

# -----------------------------------------------------------------------------
# Windows Event Log — Application Channel (optional — background noise)
# -----------------------------------------------------------------------------
[WinEventLog://Application]
disabled = false
index = main


# =============================================================================
# outputs.conf — also required on the UF
# Location: C:\Program Files\SplunkUniversalForwarder\etc\system\local\outputs.conf
#
# Replace [INDEXER_IP] with the actual IP of your macOS Splunk host.
# =============================================================================

# [tcpout]
# defaultGroup = splunk_indexer
#
# [tcpout:splunk_indexer]
# server = [INDEXER_IP]:9997
